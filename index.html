<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Men's Fear</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

body {
  margin: 0;
  font-family: 'SF Pro Text', 'SF Pro Icons', 'Helvetica Neue', Helvetica, Arial, sans-serif, system-ui;
  background: #000;
  color: #fff;
}

/* HERO */

.hero{
  min-height: 100vh;
  display: grid;
  align-content: center;
  max-width: calc(100% - (2 * var(--gutter)));
  padding-left: 48px;
  text-align: left;}
  

.hero h1{
font-size:190px;
letter-spacing:6px;
margin:0;
}

.hero p{
opacity:.7;
}

/* COVER */

.cover{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.cover img{
width:60%;
border-radius:8px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* STORIES GRID */

.stories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:40px;
padding:120px;
}

.story{
position:relative;
cursor:pointer;
overflow:hidden;
border-radius:8px;
}

.story img{
width:100%;
display:block;
transition:.4s;
}

.story:hover img{
transform:scale(1.08);
}

.story h2{
position:absolute;
bottom:20px;
left:20px;
margin:0;
font-size:50px;
}

</style>

</head>

<body>


<!-- HERO -->

<section class="hero">

<h1>MEN'S FEAR</h1>
<p>The stories men don't say out loud</p>

</section>


<!-- COVER -->

<section class="cover">

<img src="images/cover.jpg">

</section>


<!-- STORIES -->

<section class="stories">

<div class="story">
<img src="images/story1.jpg">
<h2>Fear of Failure</h2>
</div>

<div class="story">
<img src="images/story2.jpg">
<h2>The Silent Divorce</h2>
</div>

<div class="story">
<img src="images/story3.jpg">
<h2>Fatherhood</h2>
</div>

<div class="story">
<img src="images/story4.jpg">
<h2>Money</h2>
</div>

</section>



<script>

gsap.registerPlugin(ScrollTrigger);


/* COVER SCROLL */

gsap.to(".cover img",{

scale:.6,
y:-150,

scrollTrigger:{
trigger:".cover",
start:"top top",
end:"+=2000",
scrub:1.2,
pin:true
}

});


/* STORY REVEAL */

gsap.from(".story",{

y:120,
opacity:0,
stagger:.2,

scrollTrigger:{
trigger:".stories",
start:"top 80%"
}

});


</script>


</body>
</html>
